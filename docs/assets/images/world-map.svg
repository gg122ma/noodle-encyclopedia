<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Noto Sans SC, sans-serif">
  <defs>
    <linearGradient id="sea" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#sea)"/>
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Earth-面 全球政治地图</text>

  <!-- 面团联邦 -->
  <ellipse cx="420" cy="120" rx="80" ry="50" fill="#FF8F00" opacity="0.7" stroke="#E65100" stroke-width="2"/>
  <text x="420" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">面团联邦</text>
  <text x="420" y="130" text-anchor="middle" font-size="8" fill="#fff">8.7亿人口</text>

  <!-- 高汤共和国 -->
  <ellipse cx="200" cy="130" rx="60" ry="40" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">高汤共和国</text>
  <text x="200" y="140" text-anchor="middle" font-size="8" fill="#fff">5.3亿人口</text>

  <!-- 辣条走廊 -->
  <ellipse cx="320" cy="200" rx="55" ry="35" fill="#F44336" opacity="0.7" stroke="#B71C1C" stroke-width="2"/>
  <text x="320" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">辣条走廊</text>
  <text x="320" y="210" text-anchor="middle" font-size="8" fill="#fff">6.2亿人口</text>

  <!-- 油炸群岛 -->
  <ellipse cx="480" cy="250" rx="45" ry="30" fill="#FF6F00" opacity="0.7" stroke="#E65100" stroke-width="2"/>
  <text x="480" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">油炸群岛</text>
  <text x="480" y="258" text-anchor="middle" font-size="8" fill="#fff">3.1亿人口</text>

  <!-- 酱包公国 -->
  <rect x="145" y="80" width="40" height="25" rx="5" fill="#7B1FA2" opacity="0.7" stroke="#4A148C" stroke-width="2"/>
  <text x="165" y="97" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">酱包公国</text>

  <!-- 干粉高原 -->
  <ellipse cx="350" cy="100" rx="30" ry="20" fill="#795548" opacity="0.6" stroke="#4E342E" stroke-width="1.5"/>
  <text x="350" y="103" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">干粉高原</text>

  <!-- 深海骨汤城邦 -->
  <circle cx="550" cy="180" r="20" fill="#00695C" opacity="0.6" stroke="#004D40" stroke-width="1.5"/>
  <text x="550" y="183" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">深海骨汤</text>

  <!-- 极地冻干共和国 -->
  <ellipse cx="100" cy="50" rx="35" ry="20" fill="#B3E5FC" opacity="0.8" stroke="#0288D1" stroke-width="1.5"/>
  <text x="100" y="53" text-anchor="middle" font-size="7" font-weight="bold" fill="#0288D1">极地冻干</text>

  <!-- 赤道热带酸辣带 -->
  <rect x="240" y="290" width="120" height="20" rx="10" fill="#FF5722" opacity="0.5" stroke="#BF360C" stroke-width="1.5"/>
  <text x="300" y="303" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">赤道热带酸辣带</text>

  <!-- 粉末沙漠 -->
  <ellipse cx="120" cy="250" rx="40" ry="25" fill="#FFF9C4" opacity="0.8" stroke="#F9A825" stroke-width="1.5"/>
  <text x="120" y="253" text-anchor="middle" font-size="8" font-weight="bold" fill="#F57F17">粉末沙漠</text>

  <!-- 调味包圣地 -->
  <polygon points="260,160 268,145 276,160" fill="#F44336" opacity="0.8" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="268" y="175" text-anchor="middle" font-size="7" font-weight="bold" fill="#B71C1C">调味包圣地</text>

  <!-- Trade routes -->
  <path d="M260 160 Q350 140 420 120" fill="none" stroke="#795548" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <path d="M420 120 Q460 180 480 250" fill="none" stroke="#795548" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="340" y="135" font-size="7" fill="#795548" opacity="0.7">面食丝绸之路</text>

  <!-- Legend -->
  <rect x="10" y="340" width="180" height="50" rx="5" fill="white" opacity="0.8" stroke="#ccc"/>
  <text x="20" y="355" font-size="8" font-weight="bold" fill="#333">图例</text>
  <circle cx="25" cy="368" r="5" fill="#FF8F00" opacity="0.7"/><text x="35" y="371" font-size="7" fill="#333">原汤阵营</text>
  <circle cx="95" cy="368" r="5" fill="#1565C0" opacity="0.7"/><text x="105" y="371" font-size="7" fill="#333">速食阵营</text>
  <circle cx="25" cy="382" r="5" fill="#F44336" opacity="0.7"/><text x="35" y="385" font-size="7" fill="#333">辣味阵营</text>
  <circle cx="95" cy="382" r="5" fill="#7B1FA2" opacity="0.7"/><text x="105" y="385" font-size="7" fill="#333">独立势力</text>
</svg>
